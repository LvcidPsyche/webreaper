## 🔒 CYBERSECURITY GENRE

### Sources (25 feeds)
- Project Zero
- Krebs on Security
- Trail of Bits
- SpecterOps
- PortSwigger Research
- Orange Tsai
- James Kettle
- LiveOverflow
- Gynvael Coldwind
- Security Research Blogs

### Scraping Rules
```yaml
genre: cybersecurity
keywords:
  - CVE
  - vulnerability
  - exploit
  - zero-day
  - RCE
  - XSS
  - SQL injection
  - bypass
  - proof of concept
  - PoC
  - disclosure
selectors:
  title: "h1, .post-title, .entry-title"
  date: "time, .published, .date"
  content: ".post-content, .entry-content, article"
  author: ".author, .byline"
extract_metadata:
  cve_ids: true
  cvss_scores: true
  affected_products: true
  poc_links: true
```

