## AUTOMATION WORKFLOW

```bash
#!/bin/bash
# WebReaper Automated Genre Scraping

GENRES=("cybersecurity" "ai_ml" "hardware" "reverse_eng" "startups" "science")
OUTPUT_BASE="/var/lib/blogwatcher/feeds"

for genre in "${GENRES[@]}"; do
    echo "Processing genre: $genre"
    
    # Load sites for this genre
    sites=$(cat "config/genres/${genre}_sites.txt")
    
    for site in $sites; do
        name=$(echo "$site" | awk -F/ '{print $3}')
        
        # Scrape and generate feed
        python3 tools/webreaper/webreaper.py integration "$site" \
            --name "$name" \
            --output "$OUTPUT_BASE/$genre" \
            --config "config/genres/${genre}.yaml"
        
        # Import to blogwatcher
        blogwatcher add "$name" "$OUTPUT_BASE/$genre/${name}_feed.xml"
    done
done
```

