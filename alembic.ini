[alembic]
script_location = alembic
prepend_sys_path = .

# DATABASE_URL is intentionally NOT set here.
# It is read from the environment in alembic/env.py via:
#   config.set_main_option("sqlalchemy.url", os.environ["DATABASE_URL"])
#
# Set your DATABASE_URL before running migrations:
#   export DATABASE_URL=sqlite+aiosqlite:///~/.webreaper/webreaper.db
#   alembic upgrade head
#
# For Postgres (with requirements.postgres.txt installed):
#   export DATABASE_URL=postgresql+asyncpg://user:pass@localhost/webreaper
#   alembic upgrade head
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
