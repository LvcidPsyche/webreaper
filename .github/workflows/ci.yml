name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements.dev.txt
      - run: pytest tests/ --tb=short -q --ignore=tests/test_routes.py --ignore=tests/test_jobs_resume.py -m "not integration"
