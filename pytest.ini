[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --cov=webreaper
    --cov=server
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -v

# Ignore noisy warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning:aiohttp
    ignore::DeprecationWarning:playwright
